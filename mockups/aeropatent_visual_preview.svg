<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1220" viewBox="0 0 1800 1220">
  <defs>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141414"/>
      <stop offset="0.58" stop-color="#1f2421"/>
      <stop offset="1" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="space" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101214"/>
      <stop offset="0.42" stop-color="#152025"/>
      <stop offset="0.72" stop-color="#241a21"/>
      <stop offset="1" stop-color="#111318"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#161817"/>
      <stop offset="0.45" stop-color="#202926"/>
      <stop offset="1" stop-color="#311f24"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#111111" flood-opacity=".18"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .bg { fill: #f4f2ec; }
      .panel { fill: #fbfaf6; stroke: #ded9ce; stroke-width: 1; rx: 22; }
      .darkPanel { fill: url(#space); stroke: #2e3736; stroke-width: 1; rx: 22; }
      .title { font: 700 28px "Segoe UI", "Malgun Gothic", sans-serif; fill: #1d1f1d; letter-spacing: 0; }
      .screenTitle { font: 700 22px "Segoe UI", "Malgun Gothic", sans-serif; fill: #222420; letter-spacing: 0; }
      .screenTitleLight { font: 700 22px "Segoe UI", "Malgun Gothic", sans-serif; fill: #f6f1e7; letter-spacing: 0; }
      .label { font: 600 13px "Segoe UI", "Malgun Gothic", sans-serif; fill: #5d6159; letter-spacing: 0; }
      .labelLight { font: 600 13px "Segoe UI", "Malgun Gothic", sans-serif; fill: #c7d0ca; letter-spacing: 0; }
      .small { font: 500 11px "Segoe UI", "Malgun Gothic", sans-serif; fill: #767970; letter-spacing: 0; }
      .smallLight { font: 500 11px "Segoe UI", "Malgun Gothic", sans-serif; fill: #9ca9a4; letter-spacing: 0; }
      .num { font: 700 25px "Segoe UI", "Malgun Gothic", sans-serif; fill: #222420; letter-spacing: 0; }
      .numLight { font: 700 25px "Segoe UI", "Malgun Gothic", sans-serif; fill: #f6f1e7; letter-spacing: 0; }
      .micro { font: 600 9.5px "Segoe UI", "Malgun Gothic", sans-serif; fill: #73786f; letter-spacing: 0; }
      .axis { stroke: #d7d2c8; stroke-width: 1; }
      .grid { stroke: #e7e3da; stroke-width: 1; }
      .chip { fill: #efebe1; stroke: #d6d0c3; stroke-width: 1; rx: 15; }
      .chipDark { fill: rgba(255,255,255,.08); stroke: rgba(255,255,255,.14); stroke-width: 1; rx: 15; }
      .teal { fill: #19a99b; }
      .amber { fill: #d6a33d; }
      .coral { fill: #d66f5b; }
      .violet { fill: #8c74d6; }
      .blue { fill: #5b8ed6; }
      .lineTeal { stroke: #19a99b; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .lineAmber { stroke: #d6a33d; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .lineCoral { stroke: #d66f5b; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
